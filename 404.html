<!DOCTYPE html>
<html lang="en">

  <title>404 — maphouse</title>

    <rect x="49" y="72" width="22" height="23" rx="1" fill="#2c2c2c"/>
    <!-- left window -->
    <rect x="25" y="63" width="16" height="14" rx="1" fill="#2c2c2c"/>
    <!-- right window -->
    <rect x="79" y="63" width="16" height="14" rx="1" fill="#2c2c2c"/>
